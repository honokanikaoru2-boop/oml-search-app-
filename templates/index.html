<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OML インフォメーション検索</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo-mark">OML</div>
    <div style="flex:1">
      <div class="header-title">岡山医学検査センター</div>
      <div class="header-sub">インフォメーション 検査項目検索システム</div>
    </div>
    <a href="/logout" class="logout-btn">ログアウト</a>
  </div>
</header>

<div class="search-bar">
  <div class="search-bar-inner">
    <div class="search-row">
      <div class="search-input-wrap">
        <svg class="search-icon" viewBox="0 0 20 20" fill="none"><circle cx="8.5" cy="8.5" r="5.5" stroke="#888" stroke-width="1.8"/><line x1="12.5" y1="12.5" x2="17" y2="17" stroke="#888" stroke-width="1.8" stroke-linecap="round"/></svg>
        <input type="text" id="searchInput"
          placeholder="キーワードを入力（例：緑膿菌、HPV、TARC）"
          autocomplete="off">
        <button class="clear-btn" id="clearBtn" onclick="clearSearch()" title="クリア">✕</button>
      </div>
    </div>
    <div class="filter-row">
      <span class="filter-label">絞り込み：</span>
      <div class="filter-chips" id="filterChips"></div>
    </div>
  </div>
</div>

<div class="result-bar">
  <span id="resultCount">読み込み中...</span>
</div>

<main class="results" id="results">
  <div class="loading">読み込み中...</div>
</main>

<script src="/static/app.js"></script>
</body>
</html>
