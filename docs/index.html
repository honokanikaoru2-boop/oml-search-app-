<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OML インフォメーション検索</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Hiragino Sans", "Yu Gothic UI", "Meiryo", sans-serif;
    background: linear-gradient(135deg, #003e8a 0%, #0069c0 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: white;
    border-radius: 20px;
    padding: 32px 28px;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    text-align: center;
  }
  .logo {
    display: block;
    margin: 0 auto 10px;
    height: 60px;
    width: auto;
  }
  .title {
    font-size: 15px;
    color: #445;
    margin-bottom: 20px;
    line-height: 1.6;
  }
  .illust {
    width: 100%;
    border-radius: 12px;
    margin-bottom: 24px;
  }
  .status {
    font-size: 15px;
    color: #0069c0;
    font-weight: bold;
    margin-bottom: 10px;
  }
  .dots span {
    display: inline-block;
    width: 10px;
    height: 10px;
    background: #0069c0;
    border-radius: 50%;
    margin: 0 4px;
    animation: bounce 1.2s infinite ease-in-out;
  }
  .dots span:nth-child(2) { animation-delay: .2s; }
  .dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: .4; }
    40% { transform: scale(1.0); opacity: 1; }
  }
  .note { font-size: 12px; color: #aaa; margin-top: 14px; }
</style>
</head>
<body>
<div class="card">
  <img class="logo" src="oml-logo.png" alt="OML">
  <div class="title">岡山医学検査センター<br>インフォメーション検索システム</div>
  <img class="illust" src="loading.png" alt="OMLキャラクター">
  <div class="status" id="status">サーバーを起動中...</div>
  <div class="dots"><span></span><span></span><span></span></div>
  <div class="note">初回アクセス時は30秒ほどかかる場合があります</div>
</div>

<script>
const TARGET = "https://oml-search-app.onrender.com";
let attempts = 0;

async function ping() {
  attempts++;
  try {
    const res = await fetch(TARGET, { mode: "no-cors", cache: "no-store" });
    // no-corsでは常にopaqueだが接続できたことを意味する
    document.getElementById("status").textContent = "接続しました。移動中...";
    setTimeout(() => { window.location.href = TARGET; }, 500);
  } catch (e) {
    const sec = attempts * 3;
    document.getElementById("status").textContent = `サーバーを起動中... (${sec}秒経過)`;
    setTimeout(ping, 3000);
  }
}

setTimeout(ping, 1000);
</script>
</body>
</html>
